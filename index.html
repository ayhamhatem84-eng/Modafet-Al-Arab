<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز ألعاب العرب - المطور</title>
    <style>
        :root { --gold: #d4af37; --dark: #121212; --card-bg: #1e1e1e; }
        body { background-color: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }
        
        .header { background: linear-gradient(135deg, var(--gold) 0%, #aa841e 100%); padding: 20px; font-size: 22px; font-weight: bold; color: black; position: sticky; top: 0; z-index: 100; }
        
        .user-panel { background-color: var(--card-bg); margin: 10px; padding: 15px; border-radius: 20px; border: 1px solid #333; }
        .balance { font-size: 24px; font-weight: bold; color: white; display: block; }
        .rank { font-size: 14px; font-weight: bold; color: #888; }
        .svip-active { color: var(--gold); text-shadow: 0 0 5px rgba(212,175,55,0.5); }

        .wallet-section { display: flex; gap: 10px; margin: 10px; justify-content: center; }
        .btn-wallet { border: none; padding: 10px 15px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; flex: 1; font-size: 12px; }

        .bet-panel { background-color: #252525; margin: 10px; padding: 15px; border-radius: 20px; border: 1px solid #444; }
        .bet-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .bet-btn { background: #333; color: white; border: 1px solid #555; padding: 10px 2px; border-radius: 8px; font-size: 11px; }
        .bet-btn.active { background: var(--gold); color: black; border-color: var(--gold); }

        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .game-card { background: var(--card-bg); padding: 20px 5px; border-radius: 20px; border: 1px solid #333; cursor: pointer; }
        .game-icon { font-size: 50px; display: block; margin-bottom: 10px; }

        /* شاشة اللعبة */
        .game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        .slots-box { display: flex; gap: 10px; background: #222; padding: 30px; border-radius: 20px; border: 4px solid var(--gold); margin: 20px 0; font-size: 60px; }
        .spin-btn { background: linear-gradient(to right, #2e7d32, #1b5e20); color: white; border: none; padding: 15px 40px; border-radius: 15px; font-size: 20px; font-weight: bold; width: 80%; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 30px; color: white; background: none; border: none; }
    </style>
</head>
<body>
    <div class="header">مضافة العرب - مركز الألعاب 🎮</div>
    
    <div class="user-panel">
        <span class="rank" id="user-rank">لاعب متميز</span>
        <span id="darahemBalance" class="balance">1,000,000,000</span>
        
        <div class="wallet-section">
            <button onclick="googleSignIn()" class="btn-wallet" style="background: #4285F4;">دخول جوجل G</button>
            <button onclick="openStore()" class="btn-wallet" style="background: #34A853;">شراء دراهم 🛒</button>
        </div>
    </div>

    <div class="bet-panel">
        <span style="font-size: 14px; color: var(--gold);">الرهان الحالي: <b id="betDisplay">1,000,000</b></span>
        <div class="bet-buttons">
            <button class="bet-btn" onclick="changeBet(100000)">100ألف</button>
            <button class="bet-btn" onclick="changeBet(500000)">500ألف</button>
            <button class="bet-btn active" id="btn-1m" onclick="changeBet(1000000)">1مليون</button>
            <button class="bet-btn" onclick="changeBet(5000000)">5مليون</button>
        </div>
    </div>

    <div class="game-grid">
        <div class="game-card" onclick="open777()">
            <span class="game-icon">🎰</span>
            <b>لعبة 777</b>
        </div>
        <div class="game-card" onclick="alert('جاري تجهيز اللعبة...')">
            <span class="game-icon">🥩</span>
            <b>خضار ولحوم</b>
        </div>
    </div>

    <div id="game777" class="game-overlay">
        <button class="close-btn" onclick="closeGame()">×</button>
        <h2 style="color: var(--gold);">لعبة 777 المحظوظة</h2>
        <div class="slots-box">
            <div id="s1">❓</div>
            <div id="s2">❓</div>
            <div id="s3">❓</div>
        </div>
        <button class="spin-btn" onclick="spin777()">🎰 تدوير (SPIN)</button>
        <p style="margin-top: 20px; color: #888;">الجاكبوت متاح مرة يومياً لكل رهان!</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
