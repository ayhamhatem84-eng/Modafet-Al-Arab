<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مركز ألعاب العرب</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; }
        .header { background: linear-gradient(to bottom, #d4af37, #aa841e); padding: 20px; font-size: 24px; font-weight: bold; color: #000; }
        .stats { display: flex; justify-content: center; gap: 20px; padding: 20px; background: #1e1e1e; margin: 10px; border-radius: 15px; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .game-card { background: #252525; padding: 20px; border-radius: 15px; border: 1px solid #333; transition: 0.3s; }
        .game-card:active { transform: scale(0.95); background: #d4af37; color: black; }
        .game-icon { font-size: 40px; display: block; margin-bottom: 10px; }
        .svip-tag { color: #888; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">مضافة العرب - مركز الألعاب 🎮</div>
    
    <div class="stats">
        <div>
            <span style="color: #d4af37;">الرصيد:</span>
            <div id="darahemBalance" style="font-size: 20px;">1,000,000,000</div>
            <div id="user-rank" class="svip-tag">لاعب متميز</div>
        </div>
    </div>

    <div class="game-grid">
        <div class="game-card" onclick="playGame('777')">
            <span class="game-icon">🎰</span>
            <b>لعبة 777</b>
        </div>
        <div class="game-card" onclick="playGame('الخضار واللحوم')">
            <span class="game-icon">🥩</span>
            <b>خضار ولحوم</b>
        </div>
        <div class="game-card" onclick="playGame('ون بيس')">
            <span class="game-icon">🏴‍☠️</span>
            <b>ون بيس</b>
        </div>
        <div class="game-card" onclick="playGame('آلهة الرعد')">
            <span class="game-icon">⚡</span>
            <b>آلهة الرعد</b>
        </div>
        <div class="game-card" style="grid-column: span 2;" onclick="playGame('الأسماك')">
            <span class="game-icon">🐟</span>
            <b>لعبة الأسماك</b>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
